<!-- Display Django Messages with Elegant Toast Notifications -->
{% if messages %}
    <div class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-md w-full pointer-events-none">
        {% for message in messages %}
            <div class="django-message pointer-events-auto transform transition-all duration-500 ease-out translate-x-0 opacity-100"
                 role="alert"
                 data-duration="5000">

                {% if message.tags == "success" %}
                <div class="relative bg-gradient-to-r from-emerald-50 to-emerald-100 border-l-4 border-emerald-500 rounded-lg shadow-lg overflow-hidden">
                    <div class="flex items-center p-3">
                        <div class="flex-shrink-0">
                            <svg class="h-6 w-6 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="ml-3 flex-1">
                            <p class="text-sm font-medium text-emerald-800">{{ message }}</p>
                        </div>
                        <div class="ml-4 flex-shrink-0">
                            <button class="close-toast rounded-md inline-flex text-emerald-500 hover:text-emerald-700 focus:outline-none">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-emerald-500 progress-bar" style="width: 100%"></div>
                </div>

                {% elif message.tags == "error" %}
                <div class="relative bg-gradient-to-r from-red-50 to-red-100 border-l-4 border-red-500 rounded-lg shadow-lg overflow-hidden">
                    <div class="flex items-center p-3">
                        <div class="flex-shrink-0">
                            <svg class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="ml-3 flex-1">
                            <p class="text-sm font-medium text-red-800">{{ message }}</p>
                        </div>
                        <div class="ml-4 flex-shrink-0">
                            <button class="close-toast rounded-md inline-flex text-red-500 hover:text-red-700 focus:outline-none">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-red-500 progress-bar" style="width: 100%"></div>
                </div>

                {% elif message.tags == "warning" %}
                <div class="relative bg-gradient-to-r from-amber-50 to-amber-100 border-l-4 border-amber-500 rounded-lg shadow-lg overflow-hidden">
                    <div class="flex items-center p-3">
                        <div class="flex-shrink-0">
                            <svg class="h-6 w-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                        <div class="ml-3 flex-1">
                            <p class="text-sm font-medium text-amber-800">{{ message }}</p>
                        </div>
                        <div class="ml-4 flex-shrink-0">
                            <button class="close-toast rounded-md inline-flex text-amber-500 hover:text-amber-700 focus:outline-none">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-amber-500 progress-bar" style="width: 100%"></div>
                </div>

                {% elif message.tags == "info" %}
                <div class="relative bg-gradient-to-r from-blue-50 to-blue-100 border-l-4 border-blue-500 rounded-lg shadow-lg overflow-hidden">
                    <div class="flex items-center p-3">
                        <div class="flex-shrink-0">
                            <svg class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="ml-3 flex-1">
                            <p class="text-sm font-medium text-blue-800">{{ message }}</p>
                        </div>
                        <div class="ml-4 flex-shrink-0">
                            <button class="close-toast rounded-md inline-flex text-blue-500 hover:text-blue-700 focus:outline-none">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-blue-500 progress-bar" style="width: 100%"></div>
                </div>
                {% endif %}
            </div>
        {% endfor %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messages = document.querySelectorAll('.django-message');

            messages.forEach((messageElement, index) => {
                // Get duration from data attribute or default to 5000ms
                const duration = parseInt(messageElement.dataset.duration) || 5000;
                const progressBar = messageElement.querySelector('.progress-bar');

                // Stagger the entrance of multiple messages
                setTimeout(() => {
                    messageElement.classList.add('translate-x-0', 'opacity-100');
                }, index * 100);

                // Animate progress bar
                if (progressBar) {
                    progressBar.style.transition = `width Ksh. {duration}ms linear`;
                    setTimeout(() => {
                        progressBar.style.width = '0%';
                    }, 100);
                }

                // Auto-close after duration
                const timeoutId = setTimeout(() => {
                    closeMessage(messageElement);
                }, duration);

                // Close button functionality
                const closeButton = messageElement.querySelector('.close-toast');
                if (closeButton) {
                    closeButton.addEventListener('click', () => {
                        clearTimeout(timeoutId);
                        closeMessage(messageElement);
                    });
                }

                // Store timeout ID for cleanup
                messageElement._timeoutId = timeoutId;
            });

            function closeMessage(element) {
                // Slide out and fade animation
                element.style.transform = 'translateX(100%)';
                element.style.opacity = '0';

                // Remove after animation completes
                setTimeout(() => {
                    element.remove();

                    // Remove container if empty
                    const container = document.querySelector('.fixed.top-5.right-5');
                    if (container && container.children.length === 0) {
                        container.remove();
                    }
                }, 300);
            }
        });

        // Optional: Add keyboard support for closing messages (Escape key)
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const messages = document.querySelectorAll('.django-message');
                const lastMessage = messages[messages.length - 1];
                if (lastMessage) {
                    const closeButton = lastMessage.querySelector('.close-toast');
                    if (closeButton) {
                        closeButton.click();
                    }
                }
            }
        });
    </script>
{% endif %}
